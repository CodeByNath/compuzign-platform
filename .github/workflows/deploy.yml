name: Deploy to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'wp-content/plugins/compuzign-platform/**'
      - 'wp-content/themes/compuzign-shell/**'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install
        working-directory: wp-content/plugins/compuzign-platform

      - name: Build frontend assets
        run: npm run build
        working-directory: wp-content/plugins/compuzign-platform

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            cd /home/u938717127/domains/weerax.com/public_html/compuzign

            echo "PWD:"
            pwd

            echo "Before fetch:"
            git status --short
            git branch -vv
            git rev-parse HEAD || true
            git rev-parse origin/main || true
            git log --oneline -5 origin/main || true

            echo "Fetching:"
            git fetch --verbose origin main

            echo "After fetch:"
            git rev-parse origin/main
            git log --oneline -5 origin/main

            echo "Checking out plugin/theme paths:"
            git checkout -f origin/main -- wp-content/plugins/compuzign-platform
            git checkout -f origin/main -- wp-content/themes/compuzign-shell

            echo "Verify deployed files:"
            test -f wp-content/plugins/compuzign-platform/src/Core/Health.php && echo "Health.php deployed"
            test -f wp-content/plugins/compuzign-platform/src/Modules/Requests/Support/RequestSchema.php && echo "RequestSchema.php deployed"
            test -f wp-content/plugins/compuzign-platform/src/Modules/Requests/Notifications/NotificationTemplates.php && echo "NotificationTemplates.php deployed"
