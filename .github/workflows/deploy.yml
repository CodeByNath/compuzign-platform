name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install
        working-directory: wp-content/plugins/compuzign-platform

      - name: Build frontend assets
        run: npm run build
        working-directory: wp-content/plugins/compuzign-platform

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASSWORD }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            cd /home/u938717127/domains/weerax.com/public_html/compuzign
            git fetch origin main
            git checkout -f origin/main -- wp-content/plugins/compuzign-platform
            git checkout -f origin/main -- wp-content/themes/compuzign-theme
            git checkout -f origin/main -- wp-content/themes/compuzign-shell
